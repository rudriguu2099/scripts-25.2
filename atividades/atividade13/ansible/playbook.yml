---
- name: Configurar máquina cliente
  hosts: _cliente
  become: true

  tasks:
    - name: Atualizar pacotes (tolerante a falha)
      apt:
        update_cache: yes
        upgrade: yes
      ignore_errors: yes

    - name: Instalar MySQL Client
      apt:
        name: mysql-client
        state: present
      ignore_errors: yes


- name: Configurar servidor de banco de dados
  hosts: _bancodedados
  become: true

  vars:
    mysql_user: devops
    mysql_password: devops123
    mysql_database: scripts

  tasks:
    - name: Atualizar pacotes (tolerante a falha)
      apt:
        update_cache: yes
        upgrade: yes
      ignore_errors: yes

    - name: Instalar MySQL Server
      apt:
        name: mysql-server
        state: present
      ignore_errors: yes

    - name: Permitir conexões externas no MySQL
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
      notify: Reiniciar MySQL

    - name: Garantir que MySQL está ativo
      service:
        name: mysql
        state: started
        enabled: yes

    - name: Criar banco de dados (via shell)
      shell: |
        mysql -e "CREATE DATABASE IF NOT EXISTS {{ mysql_database }};"
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Criar usuário MySQL e conceder privilégios (via shell)
      shell: |
        mysql -e "CREATE USER IF NOT EXISTS '{{ mysql_user }}'@'%' IDENTIFIED BY '{{ mysql_password }}';"
        mysql -e "GRANT ALL PRIVILEGES ON *.* TO '{{ mysql_user }}'@'%' WITH GRANT OPTION;"
        mysql -e "FLUSH PRIVILEGES;"
      args:
        executable: /bin/bash
      ignore_errors: yes

  handlers:
    - name: Reiniciar MySQL
      service:
        name: mysql
        state: restarted
